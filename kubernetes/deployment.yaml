apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-ai-agent-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adk-ai-agent
  template:
    metadata:
      labels:
        app: adk-ai-agent
    spec:
      containers:
      - name: adk-agent
        image: adk-ai-platform:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
